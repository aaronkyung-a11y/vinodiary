const API_KEY_LS = "vinodiary:apiUrl";
const NAME_LS = "vinodiary:userName";
const APP_VERSION = "v0.98";

// 한국시간(KST, UTC+9) 기준 "YYYY-MM-DD HH:mm"
// 기기(올리는 지역)의 로컬 시간 기준. "YYYY-MM-DD HH:mm"
function pad2(n) { return String(n).padStart(2, "0"); }
function kstNow() {
  const d = new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())} ` +
         `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}
// 로컬 날짜만 "YYYY-MM-DD"
function kstDate() {
  const d = new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
}

// ---------- API 레이어 ----------
const DEFAULT_API_URL = "https://script.google.com/macros/s/AKfycbzW91cg-naS0BkDikV48ac2x7-LBw9lNNS-Ar2TBJx54Gj0FvbwE_4Aw34CsLwmIbBKSw/exec";
let _memUrl = "";
function getApiUrl() {
  try { return localStorage.getItem(API_KEY_LS) || _memUrl || DEFAULT_API_URL; }
  catch (e) { return _memUrl || DEFAULT_API_URL; }
}
function setApiUrl(v) {
  _memUrl = v;
  try { localStorage.setItem(API_KEY_LS, v); } catch (e) {}
}
const PROFILE_LS = "vinodiary:profile"; // 현재 선택된 프로필명
const PROFILES_LS = "vinodiary:profiles"; // 프로필 목록 JSON
const ENTRIES_CACHE_PREFIX = "vinodiary:cache:entries:"; // 프로필별 entries 캐시
// 깨진 java Object 문자열 방어(표시용). 복구 전 데이터가 화면에 노출되지 않도록.
function safeStr(v) {
  if (v == null) return "";
  const s = String(v);
  return /\[L?java\.lang\.Object;@|\[Ljava/.test(s) ? "" : s;
}
function entriesCacheKey(prof) { return ENTRIES_CACHE_PREFIX + (prof || ""); }
function readEntriesCache(prof) {
  try {
    const raw = localStorage.getItem(entriesCacheKey(prof));
    if (!raw) return null;
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : null;
  } catch (e) { return null; }
}
function writeEntriesCache(prof, list) {
  // 용량 초과 등 실패는 조용히 무시(캐시는 부가기능, 없어도 동작)
  try { localStorage.setItem(entriesCacheKey(prof), JSON.stringify(list || [])); }
  catch (e) {}
}
const DEFAULT_PROFILE = "호빈";
function getProfile() {
  try { return localStorage.getItem(PROFILE_LS) || DEFAULT_PROFILE; }
  catch (e) { return DEFAULT_PROFILE; }
}
function setProfile(v) {
  try { localStorage.setItem(PROFILE_LS, v); } catch (e) {}
}
function getProfiles() {
  try {
    const raw = localStorage.getItem(PROFILES_LS);
    const arr = raw ? JSON.parse(raw) : null;
    if (Array.isArray(arr) && arr.length) return arr;
  } catch (e) {}
  return [DEFAULT_PROFILE];
}
function saveProfiles(arr) {
  try { localStorage.setItem(PROFILES_LS, JSON.stringify(arr)); } catch (e) {}
}

// 산지/이름으로 해당 와인 지역을 판정. 없으면 null.
function detectRegion(info, name) {
  const hay = (
    (info && info.region ? info.region : "") + " " +
    (info && info.caskRegion ? info.caskRegion : "") + " " +
    (name || "")
  ).toLowerCase();
  for (const key in WINE_REGIONS) {
    const re = new RegExp(WINE_REGIONS[key].match, "i");
    if (re.test(hay)) return key;
  }
  return null;
}
// 해당 지역 내에서 '검증된 좌표가 있는' 마을을 찾음. 없으면 null(추정 금지).
function matchVillageIn(regionKey, info, name) {
  if (!regionKey || !WINE_REGIONS[regionKey]) return null;
  const hay = (
    (info && info.region ? info.region : "") + " " + (name || "")
  ).toLowerCase();
  let best = null;
  for (const v of WINE_REGIONS[regionKey].villages) {
    for (const a of v.al) {
      if (a && hay.indexOf(a) >= 0) {
        if (!best || a.length > best._len) best = { name: v.name, ko: v.ko, x: v.x, y: v.y, _len: a.length };
      }
    }
  }
  return best;
}

async function api(payload) {
  const url = getApiUrl();
  if (!url) throw new Error("API URL이 설정되지 않았습니다.");
  // 현재 프로필을 owner로 자동 주입(이미 지정된 경우 유지)
  const withOwner = (payload && payload.owner) ? payload : { ...payload, owner: getProfile() };
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" }, // CORS 프리플라이트 회피
    body: JSON.stringify(withOwner),
  });
  return res.json();
}
async function apiList() {
  const url = getApiUrl();
  const res = await fetch(url + "?action=list&owner=" + encodeURIComponent(getProfile()));
  return res.json();
}

function AxisBars({ axes }) {
  if (!axes || typeof axes !== "object") return null;
  const keys = Object.keys(axes);
  if (!keys.length) return null;
  return (
    <div style={{ marginTop: 4 }}>
      {keys.map((k) => {
        const v = Math.max(0, Math.min(5, Number(axes[k]) || 0));
        return (
          <div key={k} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 5 }}>
            <span style={{ width: 58, fontSize: 11, color: "#9A9081", flexShrink: 0, textAlign: "right" }}>

}

function ScoreRing({ value, size = 64, predicted = false }) {
  const r = size / 2 - 5;
  const circ = 2 * Math.PI * r;
  // 표시값도 0~100으로 안전하게 보정(저장된 손상값 방어). null/undefined면 "–".
  const clamped = (value == null || value === "" || isNaN(Number(value)))
    ? null : Math.max(0, Math.min(100, Math.round(Number(value))));
  const pct = (clamped == null ? 0 : clamped) / 100;
  // 예측 점수는 청록빛 은색, 실제 내 점수는 금색으로 구분
  const ringColor = predicted ? "#6FA8B5" : C.gold;
  return (
    <svg width={size} height={size} style={{ flexShrink: 0 }}>
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={C.line} strokeWidth="4" />
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={ringColor} strokeWidth="4"
        strokeDasharray={circ} strokeDashoffset={circ * (1 - pct)} strokeLinecap="round"
        transform={`rotate(-90 ${size / 2} ${size / 2})`} />
      <text x="50%" y="50%" textAnchor="middle" dominantBaseline="middle"
        fill={C.text} fontSize={size * 0.28} fontWeight="600" fontFamily="Georgia, serif">
        {clamped ?? "–"}
      </text>
      {predicted && (
        <text x="50%" y="72%" textAnchor="middle" dominantBaseline="middle"
          fill="#6FA8B5" fontSize={size * 0.14} fontFamily="system-ui">예측</text>
      )}
    </svg>
  );
}

  function onPickMenuImages(e) {
    const files = Array.from((e.target && e.target.files) || []);
    if (!files.length) return;
    files.forEach((file) => {
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          const maxW = 1600;
          let w = img.width, h = img.height;
          if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          const dataUrl = canvas.toDataURL("image/jpeg", 0.8);
          setMenuImages((prev) => prev.length >= MENU_IMG_MAX ? prev : [...prev, dataUrl.split(",")[1]]);
          setMenuPreviews((prev) => prev.length >= MENU_IMG_MAX ? prev : [...prev, dataUrl]);
        };
        img.onerror = () => {
          setMenuImages((prev) => prev.length >= MENU_IMG_MAX ? prev : [...prev, reader.result.split(",")[1]]);
          setMenuPreviews((prev) => prev.length >= MENU_IMG_MAX ? prev : [...prev, reader.result]);
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);

  // 현재 문항의 정답 판정
  function quizIsCorrect(q, sel) {
    if (!q) return false;
    if (q.type === "aroma") {
      const ans = Array.isArray(q.answer) ? [...q.answer].sort() : [];
      const cur = [...sel].sort();
      return ans.length === cur.length && ans.every((v, i) => v === cur[i]);
    }
    // level: 단일 값
    return sel.length === 1 && sel[0] === q.answer;
  }

    setQuizScores((prevS) => {
      const ns = { ...prevS };
      quizPlayers.forEach((p) => {
        const sel = quizSelById[p] || [];
        if (quizIsCorrect(q, sel)) ns[p] = (ns[p] || 0) + 1;
      });
      return ns;
    });
    const nextQ = quizQIndex + 1;
    if (nextQ < quizData.questions.length) {
      setQuizQIndex(nextQ); setQuizSelById({});

    const file = ev.target && ev.target.files && ev.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const maxW = 1600; let w = img.width, h = img.height;
        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.8);
        setQuizImageData(dataUrl.split(",")[1]); setQuizImagePreview(dataUrl);
      };
      img.onerror = () => { setQuizImageData(reader.result.split(",")[1]); setQuizImagePreview(reader.result); };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
    if (ev.target) ev.target.value = "";
  }

  // Drive 이미지 표시 실패 시 다른 형식으로 폴백 후 그래도 실패하면 숨김
  // 산지 지도(앱이 SVG로 그림). 샴페인일 때만. 그 술 산지 마을이 검증 좌표에 있으면 별 표시.
  function RegionMap({ info, name }) {
    const regionKey = detectRegion(info, name);
    if (!regionKey) return null;
    const R = WINE_REGIONS[regionKey];
    const hit = matchVillageIn(regionKey, info, name); // {name,ko,x,y} 또는 null

    // 하우스 블렌드(여러 마을·지역 블렌드) 감지 — 별을 못 찍는 게 정상인 경우 안내용
    const blendHay = ((info && info.region ? info.region : "") + " " + (name || "")).toLowerCase();
    const looksBlend = /collection|brut premier|multi.?vintage|여러|블렌드|blend|리비에르|nv\b|non.?vintage/.test(blendHay)
      || (info && info.grapes && (info.grapes.match(/,/g) || []).length >= 2);

    // 참조 마을: 그 지역 앞쪽 5개(hit과 겹치면 제외)
    let refs = R.villages.slice(0, 5).map((v) => ({ name: v.name, x: v.x, y: v.y, ko: v.ko, star: false }));
    if (hit) refs = refs.filter((v) => v.name !== hit.name);

    const VB_L = -280, VB_R = 1280, VB_W = VB_R - VB_L;
    const labels = refs.map((v) => ({ ...v }));
    if (hit) labels.push({ name: hit.name, x: hit.x, y: hit.y, ko: hit.ko || hit.name, star: true });
    // 좌/우 분배: 점 x가 500 기준
    const left = labels.filter((l) => l.x <= 500).sort((a, b) => a.y - b.y);
    const right = labels.filter((l) => l.x > 500).sort((a, b) => a.y - b.y);
    const layoutSide = (arr, side) => {
      const n = arr.length;
      const top = 100, bottom = 650, gap = n > 1 ? (bottom - top) / (n - 1) : 0;
      arr.forEach((l, i) => {
        l.ly = n > 1 ? top + gap * i : (top + bottom) / 2;
        l.lx = side === "L" ? VB_L + 40 : VB_R - 40;
        l.anchor = side === "L" ? "start" : "end";
        l.side = side;
      });
    };
    layoutSide(left, "L");
    layoutSide(right, "R");
    const allLabels = left.concat(right);

    return (
      <div style={{ marginTop: 10, background: "#EEF4F0", borderRadius: 10,
        border: `1px solid ${C.line}`, padding: 8 }}>
        <div style={{ fontSize: 12, color: C.goldDim, fontWeight: 700, marginBottom: 4 }}>
          {R.title} 지역
        </div>
        <svg viewBox={`${VB_L} 0 ${VB_W} 760`} style={{ width: "100%", display: "block" }}>
          <path d={R.path} fill="#E4EAD9" stroke="#B9A96E" strokeWidth="3" />
          {allLabels.map((l) => {
            const lineX = l.side === "L" ? l.lx + 6 : l.lx - 6;
            return <line key={"ln" + l.name} x1={lineX} y1={l.ly} x2={l.x} y2={l.y}
              stroke="#A89A7C" strokeWidth={l.star ? 2.5 : 1.8} />;
          })}
          {allLabels.map((l) => (
            l.star
              ? <text key={"st" + l.name} x={l.x} y={l.y + 26} fontSize="80" fill="#7C2A3A" textAnchor="middle">★</text>
              : <circle key={"c" + l.name} cx={l.x} cy={l.y} r="12" fill="#8C7637" />
          ))}
          {allLabels.map((l) => (
            l.star ? (
              <g key={"tx" + l.name}>
                <text x={l.lx} y={l.ly} fontSize="102" fontWeight="700" fill="#7C2A3A"
                  textAnchor={l.anchor}>{l.ko}</text>
                <text x={l.lx} y={l.ly + 52} fontSize="50" fill="#8C7637"
                  textAnchor={l.anchor}>이 술의 산지</text>
              </g>
            ) : (
              <text key={"tx" + l.name} x={l.lx} y={l.ly + 22} fontSize="66"
                fontWeight="500" fill="#241F18" textAnchor={l.anchor}>{l.ko}</text>
            )
          ))}
        </svg>
        <div style={{ fontSize: 11, color: C.sub, marginTop: 4, lineHeight: 1.5 }}>
          {hit
            ? "★ 산지 마을은 실제 좌표예요. 경계는 행정구역 개략도(포도밭 구획 아님)."
            : (looksBlend
                ? "여러 마을·지역을 섞은 블렌드라 특정 산지 마을이 없어요. 지역 전체를 표시했어요(경계는 개략도)."
                : "산지 마을을 특정하지 못해 지역만 표시했어요(경계는 개략도).")}
        </div>
      </div>
    );

  // 분석된 술이 셀러에 이미 있으면 점수·축을 가져옴
  // 이름으로 셀러/위시리스트에서 같은 술 찾기(정규화 매칭)
  function normNm(s) {
    let t = (s || "").toLowerCase().replace(/[\s\u00b7.,'"()\-]/g, "");
    // 한국어 음차 변형 통일(샤또->샤토 등 된소리/흔한 변형)
    const rep = [
      ["\uc0e4\ub610", "\uc0e4\ud1a0"], ["\uae4c\ubca0", "\uce74\ubca0"], ["\uaebc", "\uafe4"],
      ["\ub69c", "\ud2b8"], ["\ube60", "\ud30c"], ["\uc69c", "\uc640"], ["\ucef4", "\ucf64"],
      ["\uc1fc\ube44\ub1d1", "\uc18c\ube44\ub1d1"], ["\ubd80\ub974\uace0\ub09c", "\ubc84\uac74\ub514"]
    ];
    rep.forEach(function (p) { t = t.split(p[0]).join(p[1]); });
    return t;
  }
  // 셀러/위시의 특정 항목으로 이동: 탭·필터 전환 + 펼치기 + 스크롤

  function findInCellar(name) {
    if (!name) return null;
    const q = normNm(name);
    if (!q || q.length < 2) return null;
    const keys = (e) => [normNm(e.name), normNm(e.nameKo)].filter(Boolean);
    let hit = entries.find((e) => keys(e).some((k) => k === q));
    if (!hit) hit = entries.find((e) => keys(e).some((k) => k.includes(q) || q.includes(k)));
    return hit || null;
  }

  function mergeFromCellar(wine) {
    if (!wine || !wine.name) return;
    const q = wine.name.toLowerCase().replace(/\s+/g, "");
    const found = entries.find((e) => e.status !== "wishlist" &&
      (e.name || "").toLowerCase().replace(/\s+/g, "") === q);
    if (!found) return;
    const isMe = postAuthor === "me" || postAuthor === "나";
    const existingScore = isMe ? found.myScore : (found.scores ? found.scores[postAuthor] : null);
    if (existingScore != null) setPostWineScore(existingScore);
    // 셀러에 저장된 축이 있으면 그래프도 그걸로
    if (found.axes) setPostWine((prev) => prev ? { ...prev, axes: found.axes, _fromCellar: true } : prev);
    showToast("셀러에 있는 술이라 기록을 불러왔어요", "done");

  // 타임아웃+재시도 fetch. AbortController로 각 시도를 timeoutMs 후 중단하고 재시도.
  // 콜드스타트로 첫 요청이 느려도, 그 요청이 서버를 깨우므로 다음 시도가 빨라진다.
  async function fetchWithRetry(url, opts) {
    const tries = (opts && opts.tries) || 3;
    const timeoutMs = (opts && opts.timeoutMs) || 20000;
    let lastErr = null;
    for (let i = 0; i < tries; i++) {
      const ctrl = (typeof AbortController !== "undefined") ? new AbortController() : null;
      const timer = ctrl ? setTimeout(() => ctrl.abort(), timeoutMs) : null;
      try {
        const res = await fetch(url, ctrl ? { signal: ctrl.signal } : undefined);
        if (timer) clearTimeout(timer);
        return await res.json();
      } catch (e) {
        if (timer) clearTimeout(timer);
        lastErr = e;
        // 마지막 시도가 아니면 짧게 쉬고 재시도(서버가 깨어나는 시간 확보)
        if (i < tries - 1) await new Promise((r) => setTimeout(r, 1500));
      }
    }
    throw lastErr || new Error("fetch failed");
  }

  async function refresh(forProfile) {
    const prof = forProfile || curProfile;
    setSyncing(true);
    try {
      const url = getApiUrl();
      // entries+people+friends를 한 번의 왕복으로 (백엔드 bootstrap)
      // 콜드스타트(첫 호출 수십초) 대비: 타임아웃 후 재시도. 첫 요청이 서버를 깨우고 재시도가 빠르게 성공.
      const _t0 = (typeof performance !== "undefined" ? performance.now() : Date.now());
      const bootUrl = url + "?action=bootstrap&owner=" + encodeURIComponent(prof);
      const r = await fetchWithRetry(bootUrl, { tries: 3, timeoutMs: 20000 });
      try {
        const _total = Math.round((typeof performance !== "undefined" ? performance.now() : Date.now()) - _t0);
        console.log("[sync] total=" + _total + "ms server=" + (r && r._serverMs != null ? r._serverMs : "?") + "ms entries=" + ((r && r.entries) ? r.entries.length : 0));
      } catch (e) {}
      const list = r.entries || [];
      setEntries(list);
      writeEntriesCache(prof, list); // 다음 실행 즉시 표시용 캐시 갱신
      // 통합 사람 목록(전체 프로필 후보) — 폴백: 데이터의 scores 키
      let people = (r && r.people && r.people.length) ? r.people : [];
      if (!people.length) {
        const set = {};
        list.forEach((e) => { if (e.scores) Object.keys(e.scores).forEach((n) => (set[n] = true)); });
        people = Object.keys(set);
      }
      // 현재 프로필의 친구(양방향) — 폴백: scores 키
      let myFriends = (r && r.friends && r.friends.length) ? r.friends : [];
      if (!myFriends.length) {
        const s = {};
        list.forEach((e) => { if (e.scores) Object.keys(e.scores).forEach((n) => (s[n] = true)); });
        myFriends = Object.keys(s);
      }
      // 프로필 목록 = 통합 + 로컬 + 현재
      const allProfiles = Array.from(new Set([prof, ...getProfiles(), ...people])).filter(Boolean);
      setProfilesState(allProfiles);
      saveProfiles(allProfiles);
      // 친구 목록 = 현재 프로필의 친구에서 본인 제외
      const selfKeys = ["me", "나", prof].filter(Boolean);
      setRaters(myFriends.filter((p) => !selfKeys.includes(p)));
    } catch (e) {
      setError("기록을 불러오지 못했어요. API URL을 확인하세요.");
    } finally {
      setSyncing(false);
    }
  }

    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        // 가로 최대 1600px로 축소, JPEG 0.8로 재인코딩(용량↓ → 전송·분석 안정)
        const maxW = 1600;
        let w = img.width, h = img.height;
        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.8);
        setImageData(dataUrl.split(",")[1]);
        setImagePreview(dataUrl);
      };
      img.onerror = () => {
        // 디코딩 실패 시 원본 사용(폴백)
        setImageData(reader.result.split(",")[1]);
        setImagePreview(reader.result);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  }

  // 후보 하나를 골라 상세 분석
  async function analyzeOne(name, kind) {
    setError(null);
    setAnalyzing(true);
    setResult(null);
    setCellarMatch(null);
    setCandidates(null);
    setRaterScores(null);
    try {
      // analyzeForMulti에서 메인 평가자 + 비교 대상 파생 (메뉴판식 선택 통일)
      const isCommon = analyzeForMulti.includes("common");
      const mainRater = isCommon ? "common" : (analyzeForMulti[0] || "me");
      const r = await api({ action: "analyze", text: name + (kind ? " (" + kind + ")" : ""), forWhom: mainRater });
      if (r.error) throw new Error(r.error);
      setResult(r);
      // 이미 셀러/위시에 있는 술인지 확인
      try { const m = findInCellar(r.name); setCellarMatch(m || null); } catch (e) { setCellarMatch(null); }
      if (isCommon) {
        // "다 같이": 본인(me) + 친구 전원이 각각 이 술을 몇 점일지 나란히. common(가상 평가자)은 표시하지 않음.
        const everyone = ["me"].concat(raters);
        try {
          const sr = await api({ action: "scoreForRaters",
            name: r.name || name, kind: r.kind || kind, raters: everyone });
          const scores = (sr && sr.scores) ? sr.scores : [];
          setRaterScores(scores);
        } catch (e2) { /* 비교 실패는 메인 결과에 영향 없음 */ }
      } else {
        // 개별 선택: 첫 선택이 메인, 나머지는 비교. 본인 별칭 중복 제외.
        const mainIsSelf = isSelfKey(mainRater);
        const others = analyzeForMulti.filter((x) => {
          if (x === "common") return false;
          if (x === mainRater) return false;
          if (mainIsSelf && isSelfKey(x)) return false;
          return true;
        });
        if (others.length > 0) {
          try {
            const sr = await api({ action: "scoreForRaters",
              name: r.name || name, kind: r.kind || kind, raters: others });
            const otherScores = (sr && sr.scores) ? sr.scores : [];
            // 메인 평가자(위 분석 점수)를 비교 맨 앞에 직접 추가
            const mainEntry = {
              rater: mainRater,
              score: r.predictedScore,
              why: r.resembles || "",
              confidence: r.confidence || "medium",
            };
            setRaterScores([mainEntry, ...otherScores]);
          } catch (e2) { /* 비교 실패는 메인 결과에 영향 없음 */ }
        }
      }
    } catch (e) {
      setError("분석에 실패했어요. 다시 시도해 주세요.");
      console.error(e);
    } finally {
      setAnalyzing(false);
    }
  }

  // 서브타입 필터 매칭. (v0.75에서 셀러 칩 UI 제거로 현재 미사용 — 키워드 분류 로직 보존용)
  // subtype이 있으면 정확히, 없으면 이름·설명 키워드로 추정.
  // champagne/red/white만 추정 가능(rose·sweet는 이름만으로 부정확 → subtype 있는 것만).
  function matchesSubFilter(e, sub) {
    if (sub === "all") return true;
    if (sub === "whisky") return e.kind === "whisky";
    // 와인 세분류
    if (e.kind === "whisky") return false;
    if (e.subtype) return e.subtype === sub;     // subtype 있으면 정확 매칭
    if (sub === "rose" || sub === "sweet") return false; // 추정 불가 → 제외
    const t = ((e.name || "") + " " + (e.resembles || "")).toLowerCase();
    if (sub === "champagne") return /샴페인|champagne|크레망|cr[ée]mant|스파클|sparkl|franciacorta|cava|trento|샹파뉴/.test(t);
    if (sub === "red") return /레드|red|루즈|rouge|피노 누아|pinot noir|카베르네|cabernet|메를로|merlot|시라|syrah|네비올로|nebbiolo|산지오베제|sangiovese/.test(t);
    if (sub === "white") return /화이트|white|블랑|blanc|샤르도네|chardonnay|리슬링|riesling|소비뇽|sauvignon|카리칸테|carricante/.test(t) && !/샴페인|champagne|스파클|sparkl/.test(t);
    return false;
  }

  // ── 월드컵 ──
  // 카테고리에 맞는 셀러 술 추출
  function cellarForCategory(cat) {
    return entries.filter((e) => {
      if (e.status === "wishlist") return false;
      if (cat === "whisky") return e.kind === "whisky";
      if (e.kind !== "wine") return false;
      // subtype이 있으면 그걸로 정확히 분류
      if (e.subtype) {
        if (cat === "champagne") return e.subtype === "champagne";
        if (cat === "white") return e.subtype === "white" || e.subtype === "sweet";
        if (cat === "red") return e.subtype === "red";
        return true;
      }
      // subtype 없는 기존 기록: 키워드로 추정(샴페인만 비교적 확실)
      const t = ((e.name || "") + " " + (e.resembles || "")).toLowerCase();
      if (cat === "champagne") return /샴페인|champagne|크레망|cr[ée]mant|스파클|sparkl|franciacorta|cava|trento|샹파뉴/.test(t);
      if (cat === "red") return /레드|red|루즈|rouge|피노 누아|pinot noir|카베르네|cabernet|메를로|merlot|시라|syrah|네비올로|nebbiolo|산지오베제|sangiovese/.test(t);
      if (cat === "white") return /화이트|white|블랑|blanc|샤르도네|chardonnay|리슬링|riesling|소비뇽|sauvignon|카리칸테|carricante/.test(t) && !/샴페인|champagne|스파클|sparkl/.test(t);
      return true;
    });
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  async function startWorldcup() {
    if (!wcCategory) return;
    setWcLoading(true);
    setWcChampion(null); setWcRunnerUp(null);
    try {
      let pool = [];
      // 셀러 후보
      if (wcSource === "cellar" || wcSource === "mix") {
        pool = cellarForCategory(wcCategory).map((e) => ({
          name: e.name, kind: e.kind, why: e.resembles || "", fromCellar: true,
        }));
      }
      // 이름 중복 제거 헬퍼
      const dedupe = (arr) => {
        const seen = new Set();
        return arr.filter((p) => { const k = (p.name || "").toLowerCase(); if (!k || seen.has(k)) return false; seen.add(k); return true; });
      };
      pool = dedupe(pool);

      // 셀러밖(AI 생성) — 목표 수를 채울 때까지 최대 2번 시도
      if (wcSource === "outside" || wcSource === "mix") {
        if (wcSource === "outside") pool = []; // 셀러밖만이면 셀러 제외
        let attempts = 0;
        while (pool.length < wcSize && attempts < 2) {
          const need = wcSize - pool.length;
          const exclude = pool.map((p) => p.name);
          // 넉넉히 요청(필요분 + 여유 4), AI가 적게 줄 것 대비
          const gen = await api({ action: "worldcupCandidates", category: wcCategory, count: need + 4, exclude });
          if (Array.isArray(gen) && gen.length) {
            gen.forEach((g) => pool.push({ name: g.name, kind: g.kind, why: g.why || "", fromCellar: false }));
            pool = dedupe(pool);
          } else break;
          attempts++;
        }
      }

      if (pool.length < 2) {
        setError("후보가 부족해요. '셀러밖 포함' 또는 '혼합'을 선택해 보세요.");
        setTimeout(() => setError(null), 2600);
        setWcLoading(false);
        return;
      }
      // 목표 크기로. 부족하면 가능한 2의 거듭제곱으로 축소하고 안내.
      let size = wcSize;
      while (size > pool.length) size = size / 2;
      if (size < 2) size = 2;
      if (size < wcSize) {
        setError(`후보가 ${pool.length}개라 ${size}강으로 진행해요.`);
        setTimeout(() => setError(null), 2800);
      }
      const round = shuffle(pool).slice(0, size);
      setWcRound(round);
      setWcPair(0);
      setWcWinners([]);
    } catch (e) {
      setError("월드컵을 시작하지 못했어요.");
      setTimeout(() => setError(null), 2400);
    } finally {
      setWcLoading(false);
    }
  }

  function pickWinner(winner) {
    // 현재 맞대결의 두 후보
    const a = wcRound[wcPair * 2];
    const b = wcRound[wcPair * 2 + 1];
    const loser = winner === a ? b : a;
    const nextWinners = [...wcWinners, winner];
    const nextPairStart = (wcPair + 1) * 2;
    if (nextPairStart >= wcRound.length) {
      // 라운드 종료
      if (nextWinners.length === 1) {
        // 직전이 결승이었음 → 우승=winner, 준우승=결승 패자
        finishWorldcup(winner, loser);
      } else {
        setWcRound(nextWinners);
        setWcWinners([]);
        setWcPair(0);
      }
    } else {
      setWcWinners(nextWinners);
      setWcPair(wcPair + 1);
    }
  }

  async function finishWorldcup(champion, runnerUp) {
    setWcChampion(champion);
    setWcRunnerUp(runnerUp || null);
    // 우승 술이 셀러에 없으면 위시리스트에 자동 추가(취향 신호)
    if (champion && !champion.fromCellar) {
      const exists = entries.some((e) => (e.name || "").toLowerCase() === champion.name.toLowerCase());
      if (!exists) {
        const entry = {
          id: Date.now(), date: kstNow(),
          name: champion.name, kind: champion.kind, resembles: champion.why || "월드컵 우승",
          predictedScore: null, reason: "월드컵에서 선택한 술", myScore: null,
          image: "", status: "wishlist", axes: null,
          info: champion.info || null,
          infoUncertain: champion.infoUncertain || false,
        };
        await savingApi({ action: "save", entry }, "우승작 위시리스트에 담음");
        refresh();
      }
    }
  }

  function resetWorldcup() {
    setWcRound(null); setWcPair(0); setWcWinners([]);
    setWcChampion(null); setWcRunnerUp(null);
  }


  // 평가자별 점수 설정. rater="me"면 내 점수, 그 외 이름이면 친구 점수.
  async function setRating(id, rater, score) {
    setEntries((prev) => prev.map((e) => {
      if (e.id !== id) return e;
      if (rater === "me" || rater === "나") return { ...e, myScore: score, status: "tasted" };
      const scores = { ...(e.scores || {}), [rater]: score };
      return { ...e, scores, status: "tasted" };
    }));
    await savingApi({ action: "setRating", id, rater, score }, "점수 저장됨");
    if (rater !== "me" && rater !== "나" && !raters.includes(rater)) {
      setRaters((prev) => [...prev, rater]);
    }
  }

  // 위시리스트 항목을 마셔봄 → 평가 + tasted 전환
  async function tasteItem(id, score) {
    setEntries((prev) => prev.map((e) => (e.id === id ? { ...e, myScore: score, status: "tasted" } : e)));
    await savingApi({ action: "taste", id, myScore: score, date: kstNow() }, "점수 저장됨");
  }

  const [pendingDelete, setPendingDelete] = useState(null); // {entry, timer}
  function removeEntry(id) {
    const target = entries.find((e) => e.id === id);
    if (!target) return;
    // 화면에서 즉시 숨기고, 되돌리기 토스트 표시. 일정 시간 뒤 실제 삭제.
    setEntries((prev) => prev.filter((e) => e.id !== id));
    const timer = setTimeout(() => {
      api({ action: "delete", id });
      setPendingDelete(null);
    }, 5000);
    setPendingDelete({ entry: target, timer });
  }
  function undoDelete() {
    if (!pendingDelete) return;
    clearTimeout(pendingDelete.timer);
    setEntries((prev) => [pendingDelete.entry, ...prev]);
    setPendingDelete(null);
  }

  // 백업 내보내기: 현재 기록을 JSON 파일로 다운로드
  function exportData() {
    try {
      const data = { app: "Vino·Diary", version: APP_VERSION, exportedAt: kstNow(), entries };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `vinodiary-backup-${kstDate()}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast("백업 파일을 내려받았어요", "done");
    } catch (e) {
      showToast("내보내기 실패", "error");
    }
  }

  const importRef = useRef(null);
  async function importData(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const txt = await file.text();
      const data = JSON.parse(txt);
      const list = Array.isArray(data) ? data : data.entries;
      if (!Array.isArray(list) || !list.length) {
        showToast("가져올 기록이 없어요", "error");
        return;
      }
      // 이미 있는 이름은 건너뛰고 새 기록만 추가
      const have = new Set(entries.map((x) => (x.name || "").toLowerCase()));
      const fresh = list.filter((x) => x && x.name && !have.has(x.name.toLowerCase()));
      if (!fresh.length) {
        showToast("새로 추가할 기록이 없어요", "done");
        return;
      }
      showToast(`${fresh.length}개 가져오는 중…`, "loading");
      for (const it of fresh) {
        const entry = {
          id: Date.now() + Math.floor(Math.random() * 100000),
          date: it.date || kstNow(),
          name: it.name, kind: it.kind || "wine",
          resembles: it.resembles || "",
          predictedScore: it.predictedScore ?? null,
          reason: it.reason || "",
          myScore: it.myScore ?? null,
          image: "",
          status: it.status || "tasted",
          scores: it.scores || {},
          axes: it.axes || null,
          subtype: it.subtype || "",
          info: it.info || null,
          infoUncertain: it.infoUncertain || false,
        };
        await api({ action: "save", entry });
      }
      showToast(`${fresh.length}개 가져왔어요`, "done");
      refresh();
    } catch (err) {
      showToast("가져오기 실패 — 파일을 확인하세요", "error");
    } finally {
      if (importRef.current) importRef.current.value = "";
    }
  }

  async function loadRecs() {
    setRecLoading(true); setRecs(null); setProfile(null); setRecDone({});
    try {
      const cond = recCondition.trim();
      const r = await api({ action: "recommend", forWhom: recFor, condition: cond || undefined });
      setRecs(Array.isArray(r) ? r : []);
    } catch (e) {
      setRecs([]);
    } finally {
      setRecLoading(false);
    }
  }

  const [recMoreLoading, setRecMoreLoading] = useState(false);
  async function loadMoreRecs() {
    if (!recs || !recs.length) return;
    setRecMoreLoading(true);
    try {
      const exclude = recs.map((r) => r.name);
      const r = await api({ action: "recommend", forWhom: recFor, exclude, condition: recCondition.trim() || undefined });
      if (Array.isArray(r) && r.length) {
        // 중복 이름 제거하며 이어붙이기
        const have = new Set(recs.map((x) => x.name));
        const fresh = r.filter((x) => !have.has(x.name));
        setRecs((prev) => [...prev, ...fresh]);
      }
    } catch (e) {
      setError("더 불러오지 못했어요.");
      setTimeout(() => setError(null), 2000);
    } finally {
      setRecMoreLoading(false);
    }
  }

  const [merging, setMerging] = useState(false);
  async function mergeAll() {
    setMerging(true);
    try {
      const r = await api({ action: "mergeAll" });
      await refresh();
      if (r && typeof r.removed === "number") {
        // 간단 피드백
        setError(r.removed > 0 ? `중복 ${r.removed}건을 합쳤어요.` : "합칠 중복이 없어요.");
        setTimeout(() => setError(null), 2500);
      }
    } catch (e) {
      setError("합치기에 실패했어요.");
    } finally {
      setMerging(false);
    }
  }

    if (recDetail[name]) {

    setRecDetailLoading(name);

                      {profile.importanceNote && (
                        <div style={{ fontSize: 12, color: C.sub, marginTop: 8, lineHeight: 1.5 }}>
                          {profile.importanceNote}
                        </div>
                      )}
                    </div>
                  )}
                  {/* 데이터 통계 (프론트 계산) */}
                  {(() => {
                    try {
                    const who = recFor === "common" || recFor === "me" ? "me" : recFor;
                    const isMe = who === "me";
                    const scoreOf = (e) => isMe ? e.myScore : (e.scores ? e.scores[who] : null);
                    const rated = entries.filter((e) => e.status !== "wishlist" && scoreOf(e) != null);
                    if (rated.length < 3) return null;
                    const scores = rated.map(scoreOf);
                    const avg = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
                    const max = Math.max(...scores);
                    const min = Math.min(...scores);
                    const top = rated.filter((e) => scoreOf(e) === max).slice(0, 3);
                    const wineN = rated.filter((e) => e.kind === "wine").length;
                    const whiskyN = rated.filter((e) => e.kind === "whisky").length;
                    // subtype 분포(와인)
                    const subCount = {};
                    rated.filter((e) => e.kind === "wine" && e.subtype).forEach((e) => {
                      subCount[e.subtype] = (subCount[e.subtype] || 0) + 1;
                    });
                    const subLabel = { champagne: "샴페인", white: "화이트", red: "레드", rose: "로제", sweet: "스위트" };
                    return (
                      <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.line}` }}>
                        <span style={{ color: C.gold, fontSize: 11, letterSpacing: 1 }}>숫자로 보는 취향</span>
                        <div style={{ display: "flex", gap: 8, marginTop: 8, marginBottom: 10 }}>
                          {[["평가", rated.length], ["평균", avg], ["최고", max], ["최저", min]].map(([l, v], i) => (
                            <div key={i} style={{ flex: 1, background: C.panel2, borderRadius: 8,
                              padding: "8px 4px", textAlign: "center" }}>
                              <div style={{ fontSize: 16, fontWeight: 700, color: C.gold,
                                fontFamily: "Georgia, serif" }}>{v}</div>
                              <div style={{ fontSize: 10, color: C.sub, marginTop: 2 }}>{l}</div>
                            </div>
                          ))}
                        </div>
                        <div style={{ fontSize: 12, color: C.text, marginBottom: 6 }}>
                          <span style={{ color: C.sub }}>가장 좋아한 술: </span>
                          {top.map((e) => e.name).join(", ")} ({max}점)
                        </div>
                        <div style={{ fontSize: 12, color: C.sub }}>
                          와인 {wineN} · 위스키 {whiskyN}
                          {Object.keys(subCount).length > 0 && " — " +
                            Object.keys(subCount).map((k) => `${subLabel[k] || k} ${subCount[k]}`).join(", ")}
                        </div>
                      </div>
                    );
                    } catch (err) { return null; }
                  })()}
                </div>
              )}
            </div>

            {error && tab === "recommend" && (
              <div style={{ color: C.gold, fontSize: 13, marginBottom: 10, textAlign: "center" }}>
                {error}
              </div>

                    <span style={{ fontSize: 11, color: C.goldDim }}>

                    </span>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, margin: "4px 0" }}>
                    {(r.predictedScore != null) && (

                        {r.predictedScore}
                      </div>
                    )}
                    <div style={{ fontFamily: "Georgia, serif", fontSize: 17 }}>
                      {r.name}
                      {recDone[r.name] && (
                        <span style={{ marginLeft: 8, fontSize: 12, color: C.gold,
                          fontFamily: "system-ui" }}>
                          ✓ {recDone[r.name].status === "wishlist" ? "위시" : "평가됨"}
                        </span>
                      )}
                    </div>
                    {r.nameKo && r.nameKo !== r.name && (
                      <div style={{ fontSize: 12, color: C.sub, marginTop: 1 }}>{r.nameKo}</div>

                  </div>
                  <div style={{ fontSize: 13, color: C.text, lineHeight: 1.5 }}>{r.why}</div>
                  {r.predictedScore != null && (
                    <div style={{ fontSize: 11, color: C.sub, marginTop: 3 }}>예측 점수는 추정값입니다</div>

                  <div style={{ fontSize: 12, color: C.goldDim, marginTop: 6 }}>{r.est}</div>
                  {/* 빠른 담기: 자세히 펼치지 않아도 위시리스트로 */}
                  {!recDone[r.name] && (

                        fontSize: 12, cursor: "pointer" }}>
                      ✧ 위시리스트에 담기
                    </button>
                  )}
                  {recDone[r.name] && (
                    <div style={{ marginTop: 10, fontSize: 12, color: C.gold }}>
                      ✓ {recDone[r.name].status === "wishlist" ? "위시리스트에 담음"
                        : `평가 완료 (${recDone[r.name].score != null ? recDone[r.name].score + "점" : "예측치"})`}
                    </div>
                  )}
                </div>

                {open && d && !d.error && (
                  <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.line}`,
                    fontSize: 13, lineHeight: 1.6 }}>
                    {d.profile && (<div style={{ marginBottom: 8 }}>
                      <span style={{ color: C.gold, fontSize: 11, letterSpacing: 1 }}>프로파일</span>

                    {d.forYou && (<div style={{ marginBottom: 8 }}>

                    {d.pairing && (<div style={{ marginBottom: 8 }}>

                    {d.serving && (<div style={{ marginBottom: 8 }}>
                      <span style={{ color: C.gold, fontSize: 11, letterSpacing: 1 }}>서빙 팁</span>
                      <div style={{ color: C.text, marginTop: 2 }}>{d.serving}</div></div>)}
                    {d.axes && (
                      <div style={{ marginBottom: 8 }}>

                    {d.est && <div style={{ color: C.goldDim, fontSize: 12 }}>{d.est}</div>}

                    {/* 액션: 먹어봤으면 평가 / 안 먹어봤으면 위시리스트 */}
                    <div style={{ marginTop: 14, paddingTop: 12, borderTop: `1px solid ${C.line}` }}>
                      {recDone[r.name] ? (
                        <div style={{ display: "flex", alignItems: "center", gap: 10,
                          background: C.panel2, borderRadius: 10, padding: "12px 14px" }}>
                          <span style={{ fontSize: 20, color: C.gold }}>✓</span>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 13, color: C.text, fontWeight: 600 }}>
                              {recDone[r.name].status === "wishlist" ? "위시리스트에 담았어요"
                                : `평가 완료 — ${recDone[r.name].score != null ? recDone[r.name].score + "점" : "예측치로 저장"}`}

                            </div>

                          <button onClick={() => setRecDone((prev) => { const n = { ...prev }; delete n[r.name]; return n; })}

              @media (min-width: 820px) {
                .quiz-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
                .quiz-wide { max-width: 1100px; margin: 0 auto; }

            <div className="quiz-wide">

            {/* 1) 셋업: 와인 지정 + 참여자 */}
            {quizStage === "setup" && (
              <div>
                <div style={{ fontFamily: "Georgia, serif", fontSize: 22, color: C.gold, marginBottom: 4 }}>Vino Quiz</div>
                <div style={{ fontSize: 13, color: C.sub, marginBottom: 16 }}>오늘 마실 와인으로 향·맛을 맞혀 보세요.</div>

                {quizImagePreview ? (
                  <div style={{ position: "relative", marginBottom: 12, textAlign: "center" }}>
                    <img src={quizImagePreview} alt="" style={{ maxHeight: 240, borderRadius: 12, border: `1px solid ${C.line}` }} onError={imgFallback} />
                    <button onClick={() => { setQuizImageData(null); setQuizImagePreview(null); }}
                      style={{ position: "absolute", top: 8, right: 8, width: 28, height: 28, borderRadius: "50%",
                        background: "rgba(0,0,0,0.6)", color: "#fff", border: "none", fontSize: 16, cursor: "pointer" }}>×</button>
                  </div>
                ) : (
                  <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
                    <button onClick={() => quizCameraRef.current?.click()}
                      style={{ flex: 1, padding: "18px 0", background: C.panel, border: `1px dashed ${C.line}`, borderRadius: 14, cursor: "pointer", color: C.sub }}>
                      <div style={{ fontSize: 24, marginBottom: 4 }}>📷</div><div style={{ fontSize: 12 }}>라벨 찍기</div>
                    </button>
                    <button onClick={() => quizFileRef.current?.click()}
                      style={{ flex: 1, padding: "18px 0", background: C.panel, border: `1px dashed ${C.line}`, borderRadius: 14, cursor: "pointer", color: C.sub }}>
                      <div style={{ fontSize: 24, marginBottom: 4 }}>🖼️</div><div style={{ fontSize: 12 }}>갤러리</div>
                    </button>
                  </div>
                )}
                <input ref={quizCameraRef} type="file" accept="image/*" capture="environment" onChange={onPickQuizImage} style={{ display: "none" }} />
                <input ref={quizFileRef} type="file" accept="image/*" onChange={onPickQuizImage} style={{ display: "none" }} />

                <input value={quizWineInput} onChange={(e) => setQuizWineInput(e.target.value)}
                  placeholder="또는 와인 이름 입력 (예: Barolo, Cloudy Bay)"
                  style={{ width: "100%", boxSizing: "border-box", padding: "12px 14px", background: C.panel,
                    border: `1px solid ${C.line}`, borderRadius: 12, color: C.text, fontSize: 14, marginBottom: 16 }} />

                <div style={{ fontSize: 11, color: C.goldDim, letterSpacing: 1, marginBottom: 6 }}>참여자 (각자 점수 매김)</div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 20 }}>
                  {[["me", myLabel]].concat(raters.map((n) => [n, n])).map(([k, label]) => {
                    const sel = quizPlayers.includes(k);
                    return (
                      <button key={k} onClick={() => toggleQuizPlayer(k)}
                        style={{ padding: "6px 14px", fontSize: 13, borderRadius: 16, cursor: "pointer",
                          background: sel ? C.gold : C.panel, color: sel ? "#1B160C" : C.sub,
                          border: `1px solid ${sel ? C.gold : C.line}`, fontWeight: sel ? 700 : 400 }}>

                      </button>
                    );

                  <button onClick={() => addFriend((nm) => toggleQuizPlayer(nm))}
                    style={{ padding: "6px 14px", fontSize: 13, borderRadius: 16, background: "transparent",

                </div>

                  </button>
                </div>
              </div>

            {/* 3) 플레이 — 한 문항에 참여자 전원이 각자 답(위에서부터 순서대로) */}

                                  style={{ padding: "9px 15px", fontSize: 14, borderRadius: 20, cursor: "pointer",

                                  style={{ flex: 1, padding: "12px 0", fontSize: 13, borderRadius: 12, cursor: "pointer",
                                    background: on ? C.gold : C.panel, color: on ? "#1B160C" : C.sub,
                                    border: `1px solid ${on ? C.gold : C.line}`, fontWeight: on ? 700 : 400 }}>
                                  <div style={{ fontSize: 16 }}>{lv}</div>
                                  <div style={{ fontSize: 10, marginTop: 2 }}>{levelLabels[lv - 1]}</div>
                                </button>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })}

                  <button onClick={submitQuizAnswer} disabled={!ready}
                    style={{ marginTop: 24, width: "100%", padding: 14, background: ready ? C.gold : C.panel2,
                      color: ready ? "#1B160C" : C.sub, border: "none", borderRadius: 12, fontSize: 15,
                      fontWeight: 700, cursor: ready ? "pointer" : "default" }}>
                    {ready ? (isLast ? "결과 보기" : "다음 문제") : "모든 참여자가 답해 주세요"}
                  </button>
                </div>
              );
            })()}

            {/* 4) 결과 + 마무리 설명 */}
            {quizStage === "result" && quizData && (
              <div className="quiz-2col">
                <div>
                  <div style={{ fontFamily: "Georgia, serif", fontSize: 20, color: C.gold, marginBottom: 12 }}>결과</div>
                  {[...quizPlayers].sort((a, b) => (quizScores[b] || 0) - (quizScores[a] || 0)).map((p, i) => (
                    <div key={p} style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
                      padding: "12px 14px", marginBottom: 8, borderRadius: 12,
                      background: i === 0 ? C.panel2 : C.panel, border: `1px solid ${i === 0 ? C.gold : C.line}` }}>
                      <span style={{ color: C.text, fontWeight: i === 0 ? 700 : 400 }}>
                        {i === 0 ? "🏆 " : `${i + 1}. `}{quizPlayerLabel(p)}
                      </span>
                      <span style={{ color: C.gold, fontFamily: "Georgia, serif", fontWeight: 700 }}>
                        {quizScores[p] || 0} / {quizData.questions.length}
                      </span>
                    </div>
                  ))}
                  {/* 문항별 정답 복습 */}
                  <div style={{ marginTop: 16 }}>
                    <div style={{ fontSize: 11, color: C.goldDim, letterSpacing: 1, marginBottom: 8 }}>정답 & 해설</div>
                    {quizData.questions.map((q, qi) => {
                      const ansText = q.type === "aroma"
                        ? (q.answer || []).map((idx) => q.options[idx]).join(", ")
                        : ["매우 낮음", "낮음", "보통", "높음", "매우 높음"][q.answer - 1];
                      return (
                        <div key={qi} style={{ marginBottom: 12, fontSize: 13 }}>
                          <div style={{ color: C.text }}>{qi + 1}. {q.type === "aroma" ? "향" : q.axis} — <span style={{ color: C.gold }}>{ansText}</span></div>
                          {q.explain && <div style={{ color: C.sub, fontSize: 12, marginTop: 2 }}>{q.explain}</div>}
                          {/* 참여자별 정오 */}
                          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 5 }}>
                            {quizPlayers.map((p) => {
                              const sel = (quizAnswers[p] || {})[qi] || [];
                              const ok = quizIsCorrect(q, sel);
                              return (
                                <span key={p} style={{ fontSize: 11, padding: "2px 8px", borderRadius: 10,
                                  background: ok ? "rgba(120,160,90,0.18)" : "rgba(150,60,60,0.15)",
                                  color: ok ? "#6f9350" : "#b06a6a", border: `1px solid ${ok ? "#6f9350" : "#b06a6a"}44` }}>
                                  {ok ? "○" : "✗"} {quizPlayerLabel(p)}
                                </span>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
                <div>
                  <div style={{ fontFamily: "Georgia, serif", fontSize: 20, color: C.gold, marginBottom: 12 }}>이 와인 이해하기</div>
                  <div style={{ fontSize: 14, color: C.text, lineHeight: 1.8 }}>{quizData.summary}</div>
                  {quizData.servingTip && (
                    <div style={{ marginTop: 12, padding: "10px 14px", background: C.panel2, borderRadius: 10 }}>
                      <span style={{ color: C.goldDim, fontSize: 12 }}>🌡️ 서빙 </span>
                      <span style={{ color: C.text, fontSize: 13 }}>{quizData.servingTip}</span>
                    </div>
                  )}
                  {quizData.pairing && (
                    <div style={{ marginTop: 8, padding: "10px 14px", background: C.panel2, borderRadius: 10 }}>
                      <span style={{ color: C.goldDim, fontSize: 12 }}>🍽️ 페어링 </span>
                      <span style={{ color: C.text, fontSize: 13 }}>{quizData.pairing}</span>
                    </div>
                  )}
                  {quizData.estimated && <div style={{ fontSize: 11, color: C.sub, marginTop: 10 }}>※ 일부 내용은 일반적 특성에 근거한 추정입니다</div>}
                  <button onClick={resetQuiz}
                    style={{ marginTop: 20, width: "100%", padding: 14, background: "transparent", color: C.gold,
                      border: `1px solid ${C.gold}`, borderRadius: 12, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
                    새 퀴즈
                  </button>
                </div>
              </div>
            )}

            </div>
          </section>
        )}
      </main>

      {/* 저장 상태 토스트 */}
      {pendingPostDelete && (
        <div style={{ position: "fixed", left: "50%", bottom: 78, transform: "translateX(-50%)",
          zIndex: 51, background: C.panel2, color: C.text, border: `1px solid ${C.line}`,
          borderRadius: 20, padding: "9px 12px 9px 18px", fontSize: 13, display: "flex",
          alignItems: "center", gap: 12, boxShadow: "0 4px 20px rgba(0,0,0,0.4)", whiteSpace: "nowrap" }}>
          <span>기록 삭제됨</span>
          <button onClick={undoPostDelete}
            style={{ background: "none", border: "none", color: C.gold, fontWeight: 700,
              fontSize: 13, cursor: "pointer", padding: "2px 6px" }}>되돌리기</button>
        </div>
      )}
      {pendingDelete && (
        <div style={{ position: "fixed", left: "50%", bottom: 78, transform: "translateX(-50%)",
          zIndex: 51, background: C.panel2, color: C.text, border: `1px solid ${C.line}`,
          borderRadius: 20, padding: "9px 12px 9px 18px", fontSize: 13, display: "flex",
          alignItems: "center", gap: 12, boxShadow: "0 4px 20px rgba(0,0,0,0.4)", whiteSpace: "nowrap" }}>
          <span>삭제됨</span>
          <button onClick={undoDelete}
            style={{ background: "none", border: "none", color: C.gold, fontWeight: 700,
              fontSize: 13, cursor: "pointer", padding: "2px 6px" }}>되돌리기</button>
        </div>
      )}
      {toast && !pendingDelete && (
        <div style={{ position: "fixed", left: "50%", bottom: 78, transform: "translateX(-50%)",
          zIndex: 50, background: toast.kind === "error" ? "#5A2530" : C.panel2,
          color: toast.kind === "error" ? "#F4B8C0" : (toast.kind === "done" ? C.gold : C.text),
          border: `1px solid ${toast.kind === "error" ? "#7C2A3A" : C.line}`,
          borderRadius: 20, padding: "9px 18px", fontSize: 13, display: "flex", alignItems: "center",
          gap: 8, boxShadow: "0 4px 20px rgba(0,0,0,0.4)", whiteSpace: "nowrap" }}>
          {toast.kind === "loading" && (
            <span style={{ width: 12, height: 12, border: `2px solid ${C.goldDim}`,
              borderTopColor: C.gold, borderRadius: "50%", display: "inline-block",
              animation: "vd-spin 0.7s linear infinite" }} />
          )}
          {toast.kind === "done" && <span>✓</span>}
          {toast.msg}
        </div>
      )}
      <style>{`@keyframes vd-spin { to { transform: rotate(360deg); } }`}</style>

      <nav style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: C.panel,
        borderTop: `1px solid ${C.line}`, display: "flex", maxWidth: 560, margin: "0 auto" }}>
        {[["feed", "피드", "❖"], ["add", "분석", "✦"], ["cellar", "셀러", "▤"], ["recommend", "추천", "✧"], ["quiz", "퀴즈", "◈"]].map(
          ([id, label, icon]) => (
            <button key={id} onClick={() => setTab(id)}
              style={{ flex: 1, padding: "14px 0", background: "none", border: "none",
                color: tab === id ? C.gold : C.sub, fontSize: 12, cursor: "pointer",
                display: "flex", flexDirection: "column", gap: 4, alignItems: "center" }}>
              <span style={{ fontSize: 16 }}>{icon}</span>
              {label}
            </button>
          )
        )}
      </nav>
    </div>
  );
}


try {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
} catch (e) {
  var el=document.getElementById('err'); el.style.display='block';
  el.textContent='렌더 에러: '+e.message;
}
</script>
</body>
</html>
